name: Daily Instagram Post

on:
  schedule:
    - cron: '20 13 * * *'  # 15:20 CEST (summer) / 14:20 CET (winter) — always before the 18:00 posting window
  workflow_dispatch:         # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 200     # Script waits up to ~2h for the 18:00-20:00 posting window

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-dotenv cloudinary PyGithub requests

      - name: Create logs directory
        run: mkdir -p orchestrator/logs

      - name: Run Instagram auto-poster
        working-directory: orchestrator
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_RECIPIENT_ID: ${{ secrets.INSTAGRAM_RECIPIENT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: slawakupermann-cloud/kindergeschichten
        run: python instagram_auto_poster.py
