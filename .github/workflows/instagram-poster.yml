name: Daily Instagram Story Post

on:
  schedule:
    # Run daily at 17:55 CET (16:55 UTC)
    - cron: '55 16 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  post-instagram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd orchestrator
          pip install -r requirements.txt

      - name: Run Instagram poster
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          INSTAGRAM_RECIPIENT_ID: ${{ secrets.INSTAGRAM_RECIPIENT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_APP_SECRET: ${{ secrets.INSTAGRAM_APP_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          cd orchestrator
          python instagram_auto_poster.py

      - name: Check logs
        if: always()
        run: |
          if [ -f orchestrator/logs/instagram_auto_poster.log ]; then
            tail -50 orchestrator/logs/instagram_auto_poster.log
          fi
